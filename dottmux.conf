set -g default-command bash

set -g prefix C-a
unbind C-b

bind C-a send-prefix

unbind ^A
bind ^A select-pane -t :.+

set -g bell-action none

bind j select-pane -D
bind k select-pane -U
bind h select-pane -L
bind l select-pane -R

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r J resize-pane -D 25
bind -r K resize-pane -U 5
bind -r H resize-pane -L 25
bind -r L resize-pane -R 5

bind s last-window

#set -g pane-border-fg white
#set -g pane-active-border-fg cyan
#set -g pane-active-border-bg cyan

# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

#set -g default-terminal screen-256color
set -g status-keys vi
set -g history-limit 2000

setw -g mode-keys vi
#setw -g mode-mouse on
set -g mouse on
setw -g monitor-activity on

# No delay for escape key press
set -sg escape-time 0

set -g status-bg white
set -g status-fg black
#set -g window-status-current-bg white
#set -g window-status-current-fg black
#set -g window-status-current-attr bold
set -g status-interval 60
set -g status-left-length 30
#set -g status-left '#[fg=green](#S) #(whoami)'
set -g status-left '#[fg=green]#(whoami) '
set -g status-right '#[fg=yellow]#(cut -d " " -f 1-3 /proc/loadavg)#[default] #[fg=black]%H:%M#[default]'

# paste to system clipboard:  ctrl-a [, then move, then space to start, but
# then y instead of enter to copy to clipboard
run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

if-shell -b '[ "$(echo "$TMUX_VERSION < 2.5" | sed s/[a-zA-Z]//g | bc)" = 1 ]' \
  "bind -t vi-copy y copy-pipe 'xclip -in -selection clipboard'"

if-shell -b '[ "$(echo "$TMUX_VERSION >= 2.5" | sed s/[a-zA-Z]//g | bc)" = 1 ]' \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
